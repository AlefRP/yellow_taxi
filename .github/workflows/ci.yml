name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  AIRFLOW_VERSION: "2.10.5"
  DBT_VERSION: "1.9.1"
  SQLFLUFF_VERSION: "3.2.5"
  AIRFLOW_HOME: ${{ github.workspace }}
  AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__UNIT_TEST_MODE: "True"
  AIRFLOW_CONN_MY_BIGQUERY_CONNECTION: "google-cloud-platform://"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            include/cloud_run/yellow_taxi_ingest/requirements.txt

      - name: Install ruff
        run: python -m pip install ruff==0.6.9

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            dbt/yellow_taxi/packages.yml

      - name: Install Airflow and project deps
        run: |
          set -euo pipefail
          CONSTRAINT="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          python -m pip install --upgrade pip
          pip install "apache-airflow[google,http]==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT}"
          pip install -r requirements.txt --constraint "${CONSTRAINT}"
          pip install pandas pytest

      - name: Install dbt in dbt_venv
        run: |
          set -euo pipefail
          python -m venv "${GITHUB_WORKSPACE}/dbt_venv"
          "${GITHUB_WORKSPACE}/dbt_venv/bin/pip" install --upgrade pip
          "${GITHUB_WORKSPACE}/dbt_venv/bin/pip" install \
            "dbt-core==${DBT_VERSION}" "dbt-bigquery==${DBT_VERSION}"

      - name: dbt deps
        working-directory: dbt/yellow_taxi
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/yellow_taxi/ci
        run: "${GITHUB_WORKSPACE}/dbt_venv/bin/dbt" deps

      - name: Initialize Airflow DB
        run: airflow db migrate

      - name: Run pytest
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/yellow_taxi/ci
        run: pytest -ra

  dbt:
    name: dbt deps + parse + sqlfluff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt/yellow_taxi
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/yellow_taxi/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            dbt/yellow_taxi/packages.yml
            dbt/yellow_taxi/dbt_project.yml
            .sqlfluff

      - name: Install dbt and sqlfluff
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==${DBT_VERSION}" "dbt-bigquery==${DBT_VERSION}" \
                      "sqlfluff==${SQLFLUFF_VERSION}" \
                      "sqlfluff-templater-dbt==${SQLFLUFF_VERSION}"

      - name: dbt deps
        run: dbt deps

      - name: dbt parse
        run: dbt parse --target ci

      - name: SQLFluff lint (non-blocking)
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: sqlfluff lint dbt/yellow_taxi/models
