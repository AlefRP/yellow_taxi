# Profile somente para `dbt parse` / `dbt compile --no-connection` no CI.
# NÃO usar em ambiente real — credenciais são fictícias.
yellow_taxi_dbt:
  target: ci
  outputs:
    ci:
      type: bigquery
      method: service-account-json
      project: ci-fake-project
      dataset: ci_fake_dataset
      threads: 1
      location: US
      keyfile_json:
        type: service_account
        project_id: ci-fake-project
        private_key_id: "0000000000000000000000000000000000000000"
        private_key: "-----BEGIN PRIVATE KEY-----\nFAKE\n-----END PRIVATE KEY-----\n"
        client_email: ci@ci-fake-project.iam.gserviceaccount.com
        client_id: "0"
        auth_uri: https://accounts.google.com/o/oauth2/auth
        token_uri: https://oauth2.googleapis.com/token
        auth_provider_x509_cert_url: https://www.googleapis.com/oauth2/v1/certs
        client_x509_cert_url: https://example.com
