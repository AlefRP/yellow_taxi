version: 2

sources:
  - name: dbtbigq
    description: "Tabela raw carregada pelo DAG gcs_to_bigquery a partir do parquet em GCS."
    schema: "{{ env_var('BQ_DATASET', 'taxis_ny') }}"
    tables:
      - name: raw_yellow_taxi
        identifier: "{{ env_var('BQ_RAW_TABLE', 'yellow_taxi') }}"
        description: "Viagens de yellow taxi de NYC, ingeridas mensalmente do Kaggle."
        loaded_at_field: tpep_pickup_datetime
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 72, period: hour}
